# .github/workflows/deploy.yml
name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # lets GITHUB_TOKEN push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./kl_expenses
          push: true
          tags: |
            ghcr.io/tsaramaso/kl-expenses:latest
            ghcr.io/tsaramaso/kl-expenses:${{ github.sha }}