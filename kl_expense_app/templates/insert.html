<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expenses — Add entry</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <span class="user">{{ user_name }}</span>
      <form method="post" action="{{ url_for('main.logout') }}">
        <button type="submit" class="link-button">Log out</button>
      </form>
    </header>

    <div class="card">
      <h1>Add entry</h1>

      {% if message %}
        <p class="success">{{ message }}</p>
      {% endif %}

      {% if errors %}
        <ul class="error-list">
          {% for err in errors %}
            <li>{{ err }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      <form method="post" action="{{ url_for('main.insert_expense') }}">
        <label for="amount">Amount</label>
        <input
          type="number"
          id="amount"
          name="amount"
          inputmode="numeric"
          min="1"
          step="1"
          required
          value="{{ form.amount if form else '' }}"
        >

        <label for="direction">Direction</label>
        <select id="direction" name="direction" required>
          <option value="" disabled {% if not form %}selected{% endif %}>Select…</option>
          {% for d in directions %}
            <option value="{{ d.value }}" {% if form and form.direction == d.value %}selected{% endif %}>
              {{ d.value.replace('_', ' ')|title }}
            </option>
          {% endfor %}
        </select>

        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="" disabled {% if not form %}selected{% endif %}>Select…</option>
          {% for c in categories %}
            <option value="{{ c.value }}" {% if form and form.category == c.value %}selected{% endif %}>
              {{ c.value.replace('_', ' ')|title }}
            </option>
          {% endfor %}
        </select>

        <label for="group">Group</label>
        <select id="group" name="group" required>
          <option value="" disabled {% if not form %}selected{% endif %}>Select…</option>
          {% for g in groups %}
            <option value="{{ g.value }}" {% if form and form.group == g.value %}selected{% endif %}>
              {{ g.value.replace('_', ' ')|title }}
            </option>
          {% endfor %}
        </select>

        <label for="comment">Comment (optional)</label>
        <textarea id="comment" name="comment" rows="2">{{ form.comment if form else '' }}</textarea>

        <button type="submit">Save</button>
      </form>
    </div>
  </main>
</body>
</html>
